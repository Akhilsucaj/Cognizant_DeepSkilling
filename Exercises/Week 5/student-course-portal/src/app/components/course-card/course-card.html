<div
    class="course-card"
    appHighlight="lightblue"
    [ngClass]="cardClasses"
    [ngStyle]="{'border-left':'8px solid ' + borderColor}">

    <h3>{{ course.name }}</h3>

    <p><strong>ID:</strong> {{ course.id }}</p>

    <p><strong>Code:</strong> {{ course.code }}</p>

    <p><strong>Credits:</strong> {{ course.credits | creditLabel }}</p>

    <p>

        <strong>Status:</strong>

        <span [ngSwitch]="course.gradeStatus">

            <span *ngSwitchCase="'passed'" style="color:green;">
                Passed
            </span>

            <span *ngSwitchCase="'failed'" style="color:red;">
                Failed
            </span>

            <span *ngSwitchCase="'pending'" style="color:gray;">
                Pending
            </span>

        </span>

    </p>

    <button (click)="enrollCourse()">
        Enroll
    </button>

    <button (click)="toggleDetails()">
        {{ isExpanded ? 'Hide Details' : 'Show Details' }}
    </button>

    <div *ngIf="isExpanded">

        <hr>

        <p>
            This course helps students build practical knowledge in
            {{ course.name }}.
        </p>

    </div>

</div>
